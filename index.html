<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Exercise Program</title>
  <meta name="description" content="A browser-based workout timer with audio cues, multiple training programs, and session resumption.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Exercise">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="icon" type="image/svg+xml" href="app-icon.svg">
  <meta property="og:title" content="Exercise Program">
  <meta property="og:description" content="A browser-based workout timer with audio cues, multiple training programs, and session resumption.">
  <meta property="og:image" content="icon-512.png">
  <meta property="og:type" content="website">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      padding-top: calc(10px + env(safe-area-inset-top));
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      overflow-y: auto;
    }
    .container, .program-picker {
      margin: auto 0;
    }
    .container {
      text-align: center;
      max-width: 800px;
      width: 100%;
    }
    .total-time {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 5px;
    }
    .exercise-name {
      font-size: 3rem;
      font-weight: bold;
      margin: 10px 0;
      line-height: 1.1;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .exercise-timer {
      font-size: 4rem;
      font-weight: bold;
      color: #4ade80;
      margin: 5px 0;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      transition: width 0.1s linear;
    }
    .controls {
      margin-top: 10px;
    }
    button {
      font-size: 1.2rem;
      padding: 10px 30px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    .pause-btn {
      background: #f59e0b;
      color: white;
    }
    .pause-btn.paused {
      background: #4ade80;
    }
    .start-btn {
      background: #4ade80;
      color: #1a1a2e;
    }
    .reset-btn {
      background: #ef4444;
      color: white;
    }
    .exercise-info {
      font-size: 1rem;
      color: #888;
      margin-top: 5px;
    }
    .upcoming {
      margin-top: 15px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      padding: 10px 15px;
      border-radius: 8px;
    }
    .upcoming h3 {
      color: #888;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }
    .upcoming-item {
      padding: 4px 0;
      color: #aaa;
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .upcoming-item.next {
      font-size: 3rem;
      font-weight: bold;
      color: #22d3ee;
      padding: 8px 0;
    }
    .completed {
      color: #4ade80 !important;
    }

    /* Program picker */
    .program-picker {
      text-align: center;
      max-width: 800px;
      width: 100%;
    }
    .program-picker h1 {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .program-picker .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 1rem;
    }
    .program-cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .program-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 30px 40px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
      min-width: 200px;
      text-align: center;
    }
    .program-card:hover {
      border-color: #4ade80;
      transform: scale(1.03);
    }
    .program-card h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }
    .program-card .card-duration {
      font-size: 2.2rem;
      font-weight: bold;
      color: #4ade80;
    }
    .program-card .card-count {
      color: #888;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* Program header in workout view */
    .program-header {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .change-program-btn {
      font-size: 0.75rem;
      padding: 3px 10px;
      background: rgba(255,255,255,0.08);
      color: #aaa;
      border-radius: 5px;
    }
    .change-program-btn:hover {
      background: rgba(255,255,255,0.18);
      color: white;
      transform: none;
    }

    @media (max-height: 680px) {
      .exercise-name { font-size: 2rem; min-height: 55px; }
      .exercise-timer { font-size: 3rem; }
      .upcoming-item.next { font-size: 2rem; }
    }

    .exercise-list {
      margin-top: 15px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #888;
    }
    .exercise-list-item {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .exercise-list-item:last-child {
      border-bottom: none;
    }
    .exercise-list-duration {
      color: #666;
      flex-shrink: 0;
      margin-left: 12px;
    }
  </style>
</head>
<body>
  <!-- Program selection screen -->
  <div id="programPicker" class="program-picker" style="display:none;">
    <h1>Exercise Programs</h1>
    <p class="subtitle">Choose your program to get started</p>
    <div class="program-cards" id="programCards"></div>
  </div>

  <!-- Workout screen -->
  <div class="container" id="workoutContainer" style="display:none;">
    <div class="program-header">
      <span id="programTitle"></span>
      <button class="change-program-btn" id="changeProgramBtn">Change</button>
    </div>
    <div class="total-time">Total Time: <span id="totalTime">00:00</span></div>
    <div class="total-time">Remaining: <span id="totalRemaining">--:--</span></div>

    <div class="exercise-name" id="exerciseName">Press Start to Begin</div>

    <div class="exercise-timer" id="exerciseTimer">--:--</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="exercise-info" id="exerciseInfo"></div>

    <div class="controls">
      <button class="start-btn" id="startBtn">Start</button>
      <button class="pause-btn" id="pauseBtn" style="display:none;">Pause</button>
      <button class="reset-btn" id="resetBtn" style="display:none;">Reset</button>
    </div>

    <div class="upcoming" id="upcomingSection" style="display:none;">
      <h3>Coming Up</h3>
      <div id="upcomingList"></div>
    </div>

    <div class="exercise-list" id="exerciseList"></div>
  </div>

  <script src="programs.js"></script>
  <script src="app.js"></script>
</body>
</html>
