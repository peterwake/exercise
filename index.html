<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise Program</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .container {
      text-align: center;
      max-width: 800px;
      width: 100%;
    }
    .total-time {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 5px;
    }
    .exercise-name {
      font-size: 3rem;
      font-weight: bold;
      margin: 10px 0;
      line-height: 1.1;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .exercise-timer {
      font-size: 4rem;
      font-weight: bold;
      color: #4ade80;
      margin: 5px 0;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      transition: width 0.1s linear;
    }
    .controls {
      margin-top: 10px;
    }
    button {
      font-size: 1.2rem;
      padding: 10px 30px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    .pause-btn {
      background: #f59e0b;
      color: white;
    }
    .pause-btn.paused {
      background: #4ade80;
    }
    .start-btn {
      background: #4ade80;
      color: #1a1a2e;
    }
    .reset-btn {
      background: #ef4444;
      color: white;
    }
    .exercise-info {
      font-size: 1rem;
      color: #888;
      margin-top: 5px;
    }
    .upcoming {
      margin-top: 15px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      padding: 10px 15px;
      border-radius: 8px;
    }
    .upcoming h3 {
      color: #888;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }
    .upcoming-item {
      padding: 4px 0;
      color: #aaa;
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .upcoming-item.next {
      font-size: 3rem;
      font-weight: bold;
      color: #22d3ee;
      padding: 8px 0;
    }
    .completed {
      color: #4ade80 !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="total-time">Total Time: <span id="totalTime">00:00</span></div>
    <div class="total-time">Remaining: <span id="totalRemaining">--:--</span></div>

    <div class="exercise-name" id="exerciseName">Press Start to Begin</div>

    <div class="exercise-timer" id="exerciseTimer">--:--</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="exercise-info" id="exerciseInfo"></div>

    <div class="controls">
      <button class="start-btn" id="startBtn">Start</button>
      <button class="pause-btn" id="pauseBtn" style="display:none;">Pause</button>
      <button class="reset-btn" id="resetBtn" style="display:none;">Reset</button>
    </div>

    <div class="upcoming" id="upcomingSection" style="display:none;">
      <h3>Coming Up</h3>
      <div id="upcomingList"></div>
    </div>
  </div>

  <script src="exercises.js"></script>
  <script src="app.js"></script>
</body>
</html>
